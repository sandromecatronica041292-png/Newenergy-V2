<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewEnergy • Login</title>
<style>
    body { margin:0; padding:0; display:flex; align-items:center; justify-content:center; height:100vh; background:linear-gradient(135deg,#000,#1e1e1e); font-family:Arial,sans-serif; color:white; }
    .login-box { width:90%; max-width:360px; background:#111; padding:30px; border-radius:15px; box-shadow:0 0 25px rgba(255,255,0,0.3); border:1px solid #333; text-align:center; }
    .login-box h2 { margin-bottom:20px; color:#f1c40f; }
    input { width:100%; padding:12px; margin-top:10px; border:none; border-radius:8px; background:#222; color:white; font-size:15px; outline:none; }
    button { width:100%; margin-top:15px; padding:12px; background:#f1c40f; border:none; border-radius:8px; font-size:16px; font-weight:bold; cursor:pointer; }
    button:hover { background:#ffe35a; }
    .msg-erro { color:#ff5757; margin-top:12px; font-size:14px; display:none; }
    .tab-btn { width:48%; margin-right:4%; padding:8px; border-radius:6px; border:none; cursor:pointer; font-weight:bold; }
    .tab-btn:last-child { margin-right:0; }
</style>
</head>
<body>

<div class="login-box">
    <h2>NewEnergy</h2>
    <div style="margin-bottom:15px;">
        <button class="tab-btn" onclick="mostrarLogin()">Login</button>
        <button class="tab-btn" onclick="mostrarCadastro()">Cadastro</button>
    </div>

    <!-- LOGIN -->
    <div id="loginSection">
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginSenha" placeholder="Senha">
        <button onclick="login()">Entrar</button>
    </div>

    <!-- CADASTRO -->
    <div id="cadastroSection" style="display:none;">
        <input type="email" id="cadEmail" placeholder="Email">
        <input type="password" id="cadSenha" placeholder="Senha">
        <button onclick="cadastrar()">Cadastrar</button>
    </div>

    <div class="msg-erro" id="erro">Erro: usuário ou senha incorretos.</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js"></script>

<script>
const firebaseConfig = { 
    apiKey: "AIzaSyAEgLyJ6i2ZaSNnBrLMoe2ajInd4MGKHIs",
    authDomain: "controle-led-esp-oficial.firebaseapp.com",
    databaseURL: "https://controle-led-esp-oficial-default-rtdb.firebaseio.com",
    projectId: "controle-led-esp-oficial",
    storageBucket: "controle-led-esp-oficial.firebasestorage.app",
    messagingSenderId: "1082980860084",
    appId: "1:1082980860084:web:b3b669b8f1801c3d6657e1"
};
const app = firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const database = firebase.database();

// Alternar abas
function mostrarLogin(){
    document.getElementById("loginSection").style.display = "block";
    document.getElementById("cadastroSection").style.display = "none";
    document.getElementById("erro").style.display = "none";
}
function mostrarCadastro(){
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("cadastroSection").style.display = "block";
    document.getElementById("erro").style.display = "none";
}

// Cadastro
function cadastrar(){
    const email = document.getElementById("cadEmail").value;
    const senha = document.getElementById("cadSenha").value;
    if(!email || !senha){ alert("Preencha todos os campos!"); return; }

    auth.createUserWithEmailAndPassword(email, senha)
    .then((userCredential)=>{
        const uid = userCredential.user.uid;
        database.ref('usuarios/' + uid).set({
            email: email,
            statusPagamento: false,
            dataCadastro: new Date().toISOString()
        });
        alert("Cadastro realizado! Aguarde liberação após pagamento.");
    })
    .catch((error)=>{
        document.getElementById("erro").innerText = error.message;
        document.getElementById("erro").style.display = "block";
    });
}

// Login
function login(){
    const email = document.getElementById("loginEmail").value;
    const senha = document.getElementById("loginSenha").value;
    if(!email || !senha){ alert("Preencha todos os campos!"); return; }

    auth.signInWithEmailAndPassword(email, senha)
    .then((userCredential)=>{
        const uid = userCredential.user.uid;
        database.ref('usuarios/' + uid + '/statusPagamento').once('value')
        .then(snapshot=>{
            if(snapshot.val()===true){
                window.location.href = "painel.html";
            } else {
                alert("Pagamento não identificado. Acesso bloqueado.");
                auth.signOut();
            }
        });
    })
    .catch((error)=>{
        document.getElementById("erro").innerText = error.message;
        document.getElementById("erro").style.display = "block";
    });
}
</script>
</body>
</html>

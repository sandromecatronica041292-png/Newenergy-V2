<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewEnergy • Login</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #000000, #1e1e1e);
            font-family: Arial, sans-serif;
            color: white;
        }

        .login-box {
            width: 90%;
            max-width: 360px;
            background: #111;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(255, 255, 0, 0.3);
            border: 1px solid #333;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 20px;
            color: #f1c40f;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #222;
            color: white;
            font-size: 15px;
            outline: none;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            background: #f1c40f;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #ffe35a;
        }

        .msg-erro {
            color: #ff5757;
            margin-top: 12px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>NewEnergy Login</h2>

        <input type="text" id="usuario" placeholder="Usuário">
        <input type="password" id="senha" placeholder="Senha">

        <button onclick="login()">Entrar</button>

        <div class="msg-erro" id="erro">Usuário ou senha incorretos.</div>
    </div>

    <script>
        function login() {
            let user = document.getElementById("usuario").value;
            let pass = document.getElementById("senha").value;

            // Login padrão
            if (user === "admin" && pass === "1234") {
                window.location.href = "painel.html";
            } else {
                document.getElementById("erro").style.display = "block";
            }
        }
    </script>

</body>
</html>

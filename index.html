<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewEnergy • Login / Cadastro</title>
<style>
body {margin:0; padding:0; display:flex; align-items:center; justify-content:center; height:100vh; background:linear-gradient(135deg, #000, #1e1e1e); font-family:Arial,sans-serif; color:white;}
.box {width:90%; max-width:360px; background:#111; padding:30px; border-radius:15px; box-shadow:0 0 25px rgba(255,255,0,0.3); border:1px solid #333; text-align:center;}
.box h2 {margin-bottom:20px; color:#f1c40f;}
input {width:100%; padding:12px; margin-top:10px; border:none; border-radius:8px; background:#222; color:white; font-size:15px; outline:none;}
button {width:100%; margin-top:18px; padding:12px; background:#f1c40f; border:none; border-radius:8px; font-size:16px; font-weight:bold; cursor:pointer;}
button:hover {background:#ffe35a;}
.msg {color:#ff5757; margin-top:12px; font-size:14px; display:none;}
.tabs {display:flex; justify-content:space-around; margin-bottom:15px;}
.tab {cursor:pointer; padding:10px 20px; border-radius:8px; background:#222; color:#fff; font-weight:bold;}
.tab.active {background:#f1c40f; color:#000;}
</style>
</head>
<body>

<div class="box">
    <div class="tabs">
        <div class="tab active" id="tabLogin" onclick="showTab('login')">Login</div>
        <div class="tab" id="tabCadastro" onclick="showTab('cadastro')">Cadastro</div>
    </div>

    <!-- LOGIN -->
    <div id="loginBox">
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginSenha" placeholder="Senha">
        <button onclick="login()">Entrar</button>
        <div class="msg" id="msgLogin"></div>
    </div>

    <!-- CADASTRO -->
    <div id="cadastroBox" style="display:none;">
        <input type="email" id="cadEmail" placeholder="Email">
        <input type="password" id="cadSenha" placeholder="Senha">
        <button onclick="cadastrar()">Cadastrar</button>
        <div class="msg" id="msgCadastro"></div>
    </div>
</div>

<!-- Firebase compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
  // Config Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyAEgLyJ6i2ZaSNnBrLMoe2ajInd4MGKHIs",
    authDomain: "controle-led-esp-oficial.firebaseapp.com",
    databaseURL: "https://controle-led-esp-oficial-default-rtdb.firebaseio.com",
    projectId: "controle-led-esp-oficial",
    storageBucket: "controle-led-esp-oficial.firebasestorage.app",
    messagingSenderId: "1082980860084",
    appId: "1:1082980860084:web:b3b669b8f1801c3d6657e1"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  // Troca de abas
  function showTab(tab){
      document.getElementById("loginBox").style.display = tab==='login' ? 'block':'none';
      document.getElementById("cadastroBox").style.display = tab==='cadastro' ? 'block':'none';
      document.getElementById("tabLogin").classList.toggle("active", tab==='login');
      document.getElementById("tabCadastro").classList.toggle("active", tab==='cadastro');
      document.getElementById("msgLogin").style.display="none";
      document.getElementById("msgCadastro").style.display="none";
  }

  // Função login
  function login(){
      const email = document.getElementById("loginEmail").value;
      const senha = document.getElementById("loginSenha").value;
      if(!email || !senha){showMsg("msgLogin","Preencha todos os campos!"); return;}
      auth.signInWithEmailAndPassword(email, senha)
        .then(userCredential => {window.location.href="painel.html";})
        .catch(error => showMsg("msgLogin",error.message));
  }

  // Função cadastro
  function cadastrar(){
      const email = document.getElementById("cadEmail").value;
      const senha = document.getElementById("cadSenha").value;
      if(!email || !senha){showMsg("msgCadastro","Preencha todos os campos!"); return;}
      if(senha.length<6){showMsg("msgCadastro","Senha deve ter pelo menos 6 caracteres!"); return;}
      auth.createUserWithEmailAndPassword(email, senha)
        .then(userCredential => {
            const uid = userCredential.user.uid;
            // Cria nó no DB para controlar plano do usuário
            db.ref("usuarios/"+uid).set({ativo:false, criado:Date.now()});
            showMsg("msgCadastro","Cadastro realizado! Aguarde ativação após pagamento.",true);
        })
        .catch(error => showMsg("msgCadastro",error.message,false));
  }

  function showMsg(id,msg,sucesso=false){
      const el = document.getElementById(id);
      el.innerText = msg;
      el.style.color = sucesso ? "#4cff4c":"#ff5757";
      el.style.display="block";
  }
</script>
</body>
</html>

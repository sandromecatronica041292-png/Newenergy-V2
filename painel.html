<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewEnergy • Painel</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js"></script>

<style>
body { margin:0; padding:0; font-family:Arial,sans-serif; background:#000; color:white; }
header { background:#111; padding:10px; text-align:center; font-size:18px; color:#f1c40f; border-bottom:1px solid #222; }
.container { padding:10px; display:flex; flex-direction:column; gap:15px; max-width:400px; margin:auto; }
.card { background:#111; padding:12px; border-radius:10px; border:1px solid #333; box-shadow:0 0 6px rgba(255,255,0,0.1); }
.card h3 { margin-bottom:10px; font-size:16px; color:#f1c40f; }
.status-online { color:#4cff4c; font-weight:bold; font-size:14px; }
.status-offline { color:#ff5757; font-weight:bold; font-size:14px; }
canvas { width:130px !important; height:130px !important; margin:auto; display:block; }
button { width:100%; padding:10px; background:#f1c40f; border:none; border-radius:8px; font-size:15px; font-weight:bold; cursor:pointer; color:#000; }
button:hover { background:#ffe35a; }
input { width:100%; padding:8px; margin-top:5px; border-radius:6px; border:none; background:#222; color:#fff; font-size:14px; }
</style>
</head>
<body>
<header>Painel de Controle • NewEnergy</header>

<div class="container">

    <div class="card">
        <h3>Status do Dispositivo</h3>
        <p id="status" class="status-offline">Offline</p>
    </div>

    <div class="card">
        <h3>Sensores</h3>
        <canvas id="gaugeTemp"></canvas>
        <br>
        <canvas id="gaugeUmid"></canvas>
    </div>

    <div class="card">
        <h3>Controle do LED</h3>
        <button onclick="toggleLED()">Ligar / Desligar LED</button>
    </div>

    <div class="card">
        <h3>Ajustar Alerta de Temperatura</h3>
        <input type="number" id="tempAlerta" placeholder="Ex: 30">
        <button onclick="salvarAlerta()">Salvar Temperatura de Alerta</button>
    </div>

    <div class="card">
        <h3>Histórico Mensal</h3>
        <button onclick="exportarCSV()">Exportar CSV</button>
    </div>

</div>

<script>
const firebaseConfig = { 
    apiKey: "AIzaSyAEgLyJ6i2ZaSNnBrLMoe2ajInd4MGKHIs",
    authDomain: "controle-led-esp-oficial.firebaseapp.com",
    databaseURL: "https://controle-led-esp-oficial-default-rtdb.firebaseio.com",
    projectId: "controle-led-esp-oficial",
    storageBucket: "controle-led-esp-oficial.firebasestorage.app",
    messagingSenderId: "1082980860084",
    appId: "1:1082980860084:web:b3b669b8f1801c3d6657e1"
};
const app = firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const database = firebase.database();

let uid;
let gaugeTemp, gaugeUmid;
let tempRef, umidRef, ledRef, alertaRef, historicoRef;

// Aguarda DOM carregar
window.onload = function() {

    // Bloqueia acesso se não logado
    auth.onAuthStateChanged(user => {
        if(!user) window.location.href="index.html";
        else {
            uid = user.uid;
            initFirebaseRefs();
            initGauges();
            listenRealtime();
        }
    });
}

// Inicializa referências Firebase
function initFirebaseRefs() {
    tempRef = database.ref('sensores/temperatura/' + uid);
    umidRef = database.ref('sensores/umidade/' + uid);
    ledRef = database.ref('led/status/' + uid);
    alertaRef = database.ref('alerta/temperatura/' + uid);
    historicoRef = database.ref('leituras/' + uid);
}

// Inicializa gauges
function initGauges() {
    const ctxTemp = document.getElementById("gaugeTemp");
    gaugeTemp = new Chart(ctxTemp, {
        type:"doughnut",
        data:{labels:["Temp"], datasets:[{data:[50,50], backgroundColor:["#ff3b3b","#222"], borderWidth:0}]},
        options:{circumference:180, rotation:270, cutout:"80%", plugins:{legend:{display:false}}}
    });

    const ctxUmid = document.getElementById("gaugeUmid");
    gaugeUmid = new Chart(ctxUmid, {
        type:"doughnut",
        data:{labels:["Umid"], datasets:[{data:[50,50], backgroundColor:["#3498db","#222"], borderWidth:0}]},
        options:{circumference:180, rotation:270, cutout:"80%", plugins:{legend:{display:false}}}
    });
}

// Escuta valores em tempo real
function listenRealtime() {

    tempRef.on('value', snap=>{
        const t = snap.val() || 0;
        gaugeTemp.data.datasets[0].data[0] = t;
        gaugeTemp.data.datasets[0].data[1] = 100 - t;
        gaugeTemp.update();
    });

    umidRef.on('value', snap=>{
        const u = snap.val() || 0;
        gaugeUmid.data.datasets[0].data[0] = u;
        gaugeUmid.data.datasets[0].data[1] = 100 - u;
        gaugeUmid.update();
    });

    ledRef.on('value', snap=>{
        const estado = snap.exists() ? snap.val() : false;
        document.getElementById("status").innerText = estado ? "Online" : "Offline";
        document.getElementById("status").className = estado ? "status-online" : "status-offline";
    });

    // Checa pagamento do usuário
    database.ref('usuarios/' + uid + '/statusPagamento').once('value')
    .then(snapshot=>{
        if(snapshot.val()!==true){
            alert("Pagamento não identificado. Acesso bloqueado.");
            auth.signOut();
            window.location.href = "index.html";
        }
    });
}

// Funções de controle
function toggleLED() {
    ledRef.once('value').then(snap=>{
        const estado = snap.val() || false;
        ledRef.set(!estado);
    });
}

function salvarAlerta() {
    const valor = document.getElementById("tempAlerta").value;
    if(!valor) return alert("Digite uma temperatura!");
    alertaRef.set(Number(valor));
    alert("Temperatura de alerta salva: " + valor + "°C");
}

// Exporta CSV histórico
function exportarCSV() {
    historicoRef.once('value').then(snapshot=>{
        let csv = "Data,Hora,Temperatura,Umidade\n";
        snapshot.forEach(diaSnap=>{
            const dia = diaSnap.key;
            diaSnap.forEach(horaSnap=>{
                const hora = horaSnap.key;
                const temp = horaSnap.val().temp;
                const umid = horaSnap.val().umid;
                csv += `${dia},${hora},${temp},${umid}\n`;
            });
        });
        const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "historico_mensal.csv";
        link.click();
    });
}
</script>
</body>
</html>

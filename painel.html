<script>
firebase.initializeApp({
    apiKey: "AIzaSyCLnGnSEpqacBtseenPaS8CxHtZW0iD96I",
    authDomain: "controle-led-esp-oficial.firebaseapp.com",
    databaseURL: "https://controle-led-esp-oficial-default-rtdb.firebaseio.com",
    projectId: "controle-led-esp-oficial"
});

const db = firebase.database();
const auth = firebase.auth();

let config = { setpoint: 22, acAuto: false, marca_ac: "MIDEA" };

// ================= REALTIME =================
auth.onAuthStateChanged(user => {
    if (!user) {
        window.location.replace("index.html");
        return;
    }

    db.ref("/config_alertas").on("value", s => {
        const val = s.val() || {};
        config = {...config, ...val};

        document.getElementById("headerCliente").innerText = val.cliente || "CONECTADO";
        document.getElementById("acAlvoDisplay").innerText = (val.setpoint || 22) + "°";
        document.getElementById("acModalTemp").innerText = (val.setpoint || 22) + "°";

        document.getElementById("cfgCliente").value = val.cliente || "";
        document.getElementById("cfgLocal").value = val.local || "";
        document.getElementById("cfgMarcaAC").value = val.marca_ac || "MIDEA";
    });

    db.ref("/temp").on("value", s => {
        const v = parseFloat(s.val()) || 0;
        document.getElementById("tempVal").innerText = v.toFixed(1) + "°C";
    });

    db.ref("/hum").on("value", s => {
        const v = parseFloat(s.val()) || 0;
        document.getElementById("humVal").innerText = v.toFixed(0) + "%";
    });

    db.ref("/led").on("value", s => {
        const estado = s.val();
        const btn = document.getElementById("btnLED");

        btn.innerText = estado == 1 ? "DESLIGAR" : "LIGAR";
        btn.style.backgroundColor = estado == 1 ? "#00b2a9" : "#002b49";
    });
});

// ================= LED =================
function toggleLED() {
    db.ref("/led").once("value").then(s => {
        db.ref("/led").set(s.val() == 1 ? 0 : 1);
    });
}

// ================= AC INTELIGENTE =================
function ajustarSetpoint(v) {
    const novo = (config.setpoint || 22) + v;

    if (novo < 16 || novo > 30) return;

    // Atualiza interface
    db.ref("/config_alertas/setpoint").set(novo);

    // 🔥 ENVIA ESTADO REAL PRO ESP
    db.ref("/config_ar").update({
        temp: novo,
        marca: config.marca_ac || "MIDEA",
        power: true
    });
}

// ================= LIGAR/DESLIGAR =================
function ligarAC() {
    db.ref("/config_ar").update({
        power: true,
        temp: config.setpoint || 22,
        marca: config.marca_ac || "MIDEA"
    });
}

function desligarAC() {
    db.ref("/config_ar").update({
        power: false
    });
}

// ================= AUTO =================
function toggleAuto() {
    db.ref("/config_alertas/acAuto").set(!config.acAuto);
}

// ================= SALVAR CONFIG =================
function salvarConfig() {
    const data = {
        cliente: document.getElementById("cfgCliente").value,
        local: document.getElementById("cfgLocal").value,
        marca_ac: document.getElementById("cfgMarcaAC").value
    };

    db.ref("/config_alertas").update(data)
    .then(() => alert("Configurações salvas!"));
}

// ================= IR (SÓ PRA TV AGORA) =================
function sendIR(cmd) {
    db.ref("/ir_system/execute").set({
        command: cmd,
        ts: Date.now()
    });
}

// ================= LEARN =================
function startLearn(f) {
    db.ref("/ir_system/learn").set({
        active: true,
        function: f,
        ts: Date.now()
    });

    alert("Modo de gravação: " + f);
}

// ================= UI =================
const abrirModal = id => document.getElementById(id).classList.remove('hidden');
const fecharModal = id => document.getElementById(id).classList.add('hidden');

function fazerLogout() {
    auth.signOut().then(() => window.location.replace("index.html"));
}

// ADMIN
let cliques = 0;
document.getElementById("logoAdmin").onclick = () => {
    cliques++;
    if (cliques >= 5) {
        document.getElementById("adminDrawer").classList.toggle('open');
        cliques = 0;
    }
    setTimeout(() => cliques = 0, 3000);
};
</script>

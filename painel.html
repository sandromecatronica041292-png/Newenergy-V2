<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewEnergy | Monitor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --navy: #002b49; --green: #00b2a9; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: var(--navy); }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .btn-action { transition: all 0.2s; user-select: none; }
        .btn-action:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto space-y-6">
        <!-- MONITOR DE TEMPERATURA -->
        <div class="card p-6 text-center">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Temperatura Ambiente</span>
            <h2 id="tempAtual" class="text-5xl font-black mt-2 text-[#00b2a9]">--°C</h2>
        </div>

        <!-- CONTROLE DO AR -->
        <div class="card overflow-hidden">
            <div class="bg-[#002b49] p-8 text-center text-white">
                <span class="text-[10px] font-bold opacity-50 uppercase">Ajuste de Climatização</span>
                <div class="flex justify-center items-center gap-8 mt-6">
                    <button onclick="ajustarSetpoint(-1)" class="w-14 h-14 rounded-full border border-white/20 text-2xl btn-action">－</button>
                    <span id="displaySetpoint" class="text-6xl font-light w-24">--°</span>
                    <button onclick="ajustarSetpoint(1)" class="w-14 h-14 rounded-full border border-white/20 text-2xl btn-action">＋</button>
                </div>
            </div>
            <div class="p-6 grid grid-cols-2 gap-4">
                <button onclick="setPower(true)" class="py-4 bg-emerald-500 text-white rounded-2xl font-bold btn-action uppercase text-xs">Ligar</button>
                <button onclick="setPower(false)" class="py-4 bg-rose-500 text-white rounded-2xl font-bold btn-action uppercase text-xs">Desligar</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            databaseURL: "https://controle-led-esp-oficial-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let estadoLocal = { setpoint: 22, power: false };

        // SINCRONIZAÇÃO EM TEMPO REAL
        db.ref("/config_alertas").on("value", (snapshot) => {
            const data = snapshot.val();
            if (data) {
                estadoLocal = data;
                // Força o valor a ser tratado como número
                const temp = parseInt(data.setpoint) || 22;
                document.getElementById("displaySetpoint").innerText = temp + "°";
            }
        });

        db.ref("/telemetria/temperatura").on("value", (s) => {
            document.getElementById("tempAtual").innerText = s.val() + "°C";
        });

        // FUNÇÃO DE AJUSTE (CORRIGIDA)
        function ajustarSetpoint(valor) {
            let novoSetpoint = parseInt(estadoLocal.setpoint) + valor;

            // Segurança: Padrão industrial 16°C a 30°C
            if (novoSetpoint < 16) novoSetpoint = 16;
            if (novoSetpoint > 30) novoSetpoint = 30;

            // Grava o novo valor e notifica o ESP32
            db.ref("/config_alertas/setpoint").set(novoSetpoint).then(() => {
                db.ref("/ir_system/execute").set({
                    command: "ac_update",
                    ts: Date.now()
                });
            });
        }

        function setPower(status) {
            db.ref("/config_alertas/power").set(status).then(() => {
                db.ref("/ir_system/execute").set({
                    command: "ac_update",
                    ts: Date.now()
                });
            });
        }
    </script>
</body>
</html>

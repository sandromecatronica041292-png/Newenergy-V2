<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewEnergy - Surgical Sync Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #004a99;
            --success: #28a745;
            --danger: #dc3545;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); padding: 20px; }
        .card-admin {
            background: white;
            border-radius: 12px;
            padding: 25px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h3 { color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        .input-field {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .control-group { display: flex; gap: 10px; margin-top: 25px; }
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-on { background-color: var(--success); }
        .btn-on:hover { background-color: #218838; }
        .btn-off { background-color: var(--danger); }
        .btn-off:hover { background-color: #c82333; }
        .temp-display { text-align: center; font-size: 2em; margin: 10px 0; color: var(--primary); }
    </style>
</head>
<body>

<div class="card-admin">
    <h3>Controle de Climatização</h3>
    
    <label>Marca do Ar Condicionado:</label>
    <select id="marca_ac" class="input-field">
        <option value="20">Midea / Carrier / Springer / Conffee</option>
        <option value="19">Philco / Elgin / Silvermaxx</option>
        <option value="6">LG (Nativo)</option>
        <option value="15">Gree</option>
        <option value="3">Samsung (Nativo)</option>
        <option value="1">Daikin (Nativo)</option>
        <option value="2">Mitsubishi (Nativo)</option>
        <option value="11">Panasonic</option>
        <option value="31">TCL</option>
        <option value="34">Electrolux</option>
        <option value="36">Consul / Brastemp</option>
    </select>

    <label>Temperatura Desejada:</label>
    <div class="temp-display"><span id="temp_val">24</span>°C</div>
    <input type="range" id="setpoint_input" min="16" max="30" value="24" class="input-field" 
           oninput="document.getElementById('temp_val').innerText = this.value">

    <label>Modo:</label>
    <select id="ac_mode" class="input-field">
        <option value="cool">Frio (Cooling)</option>
        <option value="dry">Desumidificar (Dry)</option>
        <option value="fan">Ventilar (Fan Only)</option>
        <option value="heat">Quente (Heating)</option>
    </select>

    <div class="control-group">
        <button onclick="enviarComandoAC(true)" class="btn-on">LIGAR APARELHO</button>
        <button onclick="enviarComandoAC(false)" class="btn-off">DESLIGAR APARELHO</button>
    </div>
</div>

<script>
    // Configurações do seu Firebase (Verifique se as chaves batem com o seu projeto)
    const firebaseConfig = {
        databaseURL: "https://controle-led-esp-oficial-default-rtdb.firebaseio.com"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function enviarComandoAC(powerStatus) {
        const marca = document.getElementById('marca_ac').value;
        const temp = document.getElementById('setpoint_input').value;
        const modo = document.getElementById('ac_mode').value;

        // Estrutura de dados para o monitoramento
        const configData = {
            marca_ac: parseInt(marca),
            power: powerStatus,
            setpoint: parseInt(temp),
            ac_mode: modo,
            timestamp: Date.now()
        };

        // 1. Grava as configurações no Firebase
        database.ref('/config_alertas').set(configData)
        .then(() => {
            // 2. Envia o gatilho de execução com ID único para o ESP32 não ignorar
            return database.ref('/ir_system/execute').set("ac_update_" + Date.now());
        })
        .then(() => {
            console.log("Comando enviado: ", configData);
        })
        .catch((error) => {
            alert("Erro ao enviar: " + error.message);
        });
    }
</script>

</body>
</html>

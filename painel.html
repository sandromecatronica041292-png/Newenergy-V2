<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewEnergy | Smart Control</title>
    <!-- Tailwind para Design Moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Firebase Legacy SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .btn-active:active { transform: scale(0.95); transition: 0.1s; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="pb-10">

    <!-- Navegação -->
    <nav class="bg-[#002b49] text-white p-4 shadow-lg mb-6">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2" id="btnAdminTrigger">
                <div class="w-8 h-8 bg-[#00b2a9] rounded-lg flex items-center justify-center font-black text-white">NE</div>
                <h1 class="font-bold tracking-tight">NewEnergy Solutions</h1>
            </div>
            <div id="wifi-status" class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4">
        
        <!-- Dashboard de Sensores -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="glass-card p-4 rounded-2xl border border-slate-200 shadow-sm text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Temperatura</p>
                <h2 id="tempVal" class="text-3xl font-black text-slate-800">--°C</h2>
            </div>
            <div class="glass-card p-4 rounded-2xl border border-slate-200 shadow-sm text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Umidade</p>
                <h2 id="humVal" class="text-3xl font-black text-slate-800">--%</h2>
            </div>
        </div>

        <!-- Controle de Ar Condicionado -->
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100 mb-6">
            <div class="bg-slate-50 p-4 border-b border-slate-100 flex justify-between items-center">
                <span class="text-xs font-bold text-slate-500">AR CONDICIONADO</span>
                <span id="acStatusLabel" class="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-bold">PRONTO</span>
            </div>
            
            <div class="p-8 text-center">
                <div class="flex justify-center items-center gap-8 mb-8">
                    <button onclick="ajustarSetpoint(-1)" class="w-14 h-14 rounded-full bg-slate-100 flex items-center justify-center text-2xl font-bold btn-active shadow-sm">－</button>
                    <div class="flex flex-col">
                        <span id="displaySetpoint" class="text-6xl font-black text-[#002b49]">22</span>
                        <span class="text-sm font-bold text-slate-300">GRAUS</span>
                    </div>
                    <button onclick="ajustarSetpoint(1)" class="w-14 h-14 rounded-full bg-slate-100 flex items-center justify-center text-2xl font-bold btn-active shadow-sm">＋</button>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="enviarComandoIR('ac_on')" class="bg-emerald-500 text-white py-4 rounded-2xl font-bold text-sm shadow-lg shadow-emerald-200 btn-active uppercase">Ligar</button>
                    <button onclick="enviarComandoIR('ac_off')" class="bg-rose-500 text-white py-4 rounded-2xl font-bold text-sm shadow-lg shadow-rose-200 btn-active uppercase">Desligar</button>
                </div>
            </div>
        </div>

        <!-- Botão de Iluminação -->
        <div class="bg-white p-6 rounded-3xl shadow-md flex justify-between items-center mb-10">
            <div>
                <h4 class="font-bold text-slate-800">Iluminação</h4>
                <p id="ledDesc" class="text-xs text-slate-400">Status: Desligado</p>
            </div>
            <button id="btnToggleLED" onclick="toggleLED()" class="w-12 h-12 rounded-full bg-slate-800 flex items-center justify-center btn-active transition-colors">
                <span id="ledIcon">⚫</span>
            </button>
        </div>

        <!-- Painel de Engenharia (Oculto por padrão) -->
        <div id="adminPanel" class="hidden bg-slate-800 text-white p-6 rounded-3xl shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xs font-black tracking-widest text-[#00b2a9]">MODO ENGENHARIA IR</h3>
                <button onclick="fecharAdmin()" class="text-slate-500">✕</button>
            </div>
            <p class="text-[10px] text-slate-400 mb-4 leading-relaxed">
                Clique na função e aponte o controle remoto para o sensor do ESP32 para gravar a frequência.
            </p>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="gravarComando('ac_on')" class="bg-white/10 hover:bg-white/20 p-3 rounded-lg text-[10px] font-bold transition-all">GRAVAR LIGAR</button>
                <button onclick="gravarComando('ac_off')" class="bg-white/10 hover:bg-white/20 p-3 rounded-lg text-[10px] font-bold transition-all">GRAVAR DESLIGAR</button>
                <button onclick="gravarComando('ac_temp_up')" class="bg-white/10 hover:bg-white/20 p-3 rounded-lg text-[10px] font-bold transition-all">GRAVAR TEMP +</button>
                <button onclick="gravarComando('ac_temp_down')" class="bg-white/10 hover:bg-white/20 p-3 rounded-lg text-[10px] font-bold transition-all">GRAVAR TEMP -</button>
            </div>
        </div>

    </main>

    <script>
        // Configuração do Firebase
        const firebaseConfig = {
            databaseURL: "https://controle-led-esp-oficial-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Variáveis de Estado
        let setpoint = 22;

        // --- Sincronização em Tempo Real ---
        
        // Temperatura e Umidade
        db.ref("/temp").on("value", s => document.getElementById("tempVal").innerText = s.val() + "°C");
        db.ref("/hum").on("value", s => document.getElementById("humVal").innerText = s.val() + "%");

        // Status do LED
        db.ref("/led").on("value", s => {
            const estado = s.val();
            const btn = document.getElementById("btnToggleLED");
            const icon = document.getElementById("ledIcon");
            const desc = document.getElementById("ledDesc");

            if(estado == 1) {
                btn.style.backgroundColor = "#00b2a9";
                icon.innerText = "💡";
                desc.innerText = "Status: Ligado";
            } else {
                btn.style.backgroundColor = "#1e293b";
                icon.innerText = "⚫";
                desc.innerText = "Status: Desligado";
            }
        });

        // --- Funções de Controle ---

        function toggleLED() {
            db.ref("/led").once("value", s => {
                db.ref("/led").set(s.val() == 1 ? 0 : 1);
            });
        }

        function ajustarSetpoint(val) {
            setpoint += val;
            if(setpoint < 16) setpoint = 16;
            if(setpoint > 30) setpoint = 30;
            document.getElementById("displaySetpoint").innerText = setpoint;
            
            // Opcional: Enviar comando IR de temp ao ajustar
            enviarComandoIR(val > 0 ? "ac_temp_up" : "ac_temp_down");
        }

        function enviarComandoIR(cmd) {
            db.ref("/ir_system/execute").set({
                command: cmd,
                ts: Date.now()
            }).then(() => {
                const label = document.getElementById("acStatusLabel");
                label.innerText = "ENVIANDO...";
                label.className = "text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-bold";
                
                setTimeout(() => {
                    label.innerText = "PRONTO";
                    label.className = "text-[10px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-bold";
                }, 2000);
            });
        }

        // --- Funções de Engenharia (IR Learn) ---

        function gravarComando(funcao) {
            db.ref("/ir_system/learn").set({
                active: true,
                function: funcao,
                ts: Date.now()
            });
            alert("Modo de Gravação Ativo!\n\nO ESP32 está esperando o sinal do controle para a função: " + funcao);
        }

        // Segredo para abrir o painel (5 cliques na logo)
        let cliques = 0;
        document.getElementById("btnAdminTrigger").onclick = () => {
            cliques++;
            if(cliques >= 5) {
                document.getElementById("adminPanel").classList.remove('hidden');
                cliques = 0;
            }
            setTimeout(() => cliques = 0, 3000);
        };

        function fecharAdmin() {
            document.getElementById("adminPanel").classList.add('hidden');
        }

    </script>
</body>
</html>

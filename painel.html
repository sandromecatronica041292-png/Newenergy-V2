<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewEnergy | Monitor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --navy: #002b49; --green: #00b2a9; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: var(--navy); }
        .btn-active-effect:active { transform: scale(0.96); transition: all 0.1s; }
        .card-premium { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; transition: all 0.3s ease; }
        .gauge-container { position: relative; width: 120px; height: 60px; overflow: hidden; }
        .gauge-bg { fill: none; stroke: #f1f5f9; stroke-width: 10; }
        .gauge-fill { fill: none; stroke: var(--green); stroke-width: 10; stroke-linecap: round; transition: stroke-dasharray 1.2s ease; }
        .modal-blur { backdrop-filter: blur(12px); background: rgba(0, 43, 73, 0.4); z-index: 60; }
        #adminDrawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); z-index: 100; }
        #adminDrawer.open { transform: translateX(0); }
        .ac-mode-btn { @apply flex flex-col items-center p-3 rounded-2xl bg-slate-50 border-2 border-transparent transition-all; }
        .ac-mode-btn.active { @apply border-[#00b2a9] bg-[#002b49] text-[#00b2a9]; }
    </style>
</head>
<body class="pb-10">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 h-16 flex items-center px-6 justify-between">
        <div class="flex items-center gap-3 cursor-pointer" id="logoAdmin">
            <div class="w-8 h-8 bg-navy rounded-lg flex items-center justify-center text-green">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <div>
                <h1 class="font-bold text-sm leading-none tracking-tight">NewEnergy</h1>
                <span id="headerCliente" class="text-[10px] text-slate-400 font-medium">CONECTANDO...</span>
            </div>
        </div>
        <button onclick="fazerLogout()" class="text-[10px] font-black text-rose-500 uppercase tracking-widest">Sair</button>
    </nav>

    <main class="max-w-4xl mx-auto px-6 mt-8">
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="card-premium p-6 flex flex-col items-center shadow-sm">
                <span class="text-[10px] font-bold text-slate-400 uppercase mb-3">Temperatura</span>
                <div class="gauge-container"><svg viewBox="0 0 100 50"><path class="gauge-bg" d="M10 45 A 35 35 0 0 1 90 45" /><path id="tempGauge" class="gauge-fill" d="M10 45 A 35 35 0 0 1 90 45" stroke-dasharray="0 126" /></svg></div>
                <h2 id="tempVal" class="text-3xl font-black mt-[-10px]">--°C</h2>
            </div>
            <div class="card-premium p-6 flex flex-col items-center shadow-sm">
                <span class="text-[10px] font-bold text-slate-400 uppercase mb-3">Umidade</span>
                <div class="gauge-container"><svg viewBox="0 0 100 50"><path class="gauge-bg" d="M10 45 A 35 35 0 0 1 90 45" /><path id="humGauge" class="gauge-fill" d="M10 45 A 35 35 0 0 1 90 45" stroke-dasharray="0 126" style="stroke: #3b82f6;" /></svg></div>
                <h2 id="humVal" class="text-3xl font-black mt-[-10px]">--%</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div onclick="abrirModal('acModal')" class="card-premium p-6 flex flex-col justify-between aspect-square cursor-pointer btn-active-effect hover:border-teal-200">
                <div class="flex justify-between items-start">
                    <div class="w-12 h-12 bg-teal-50 text-teal-600 rounded-2xl flex items-center justify-center text-2xl">❄️</div>
                    <span id="badgeAC" class="text-[9px] font-bold px-2 py-1 rounded-full bg-slate-100">STATUS</span>
                </div>
                <div>
                    <h4 class="font-bold text-lg">Climatização</h4>
                    <div id="acAlvoDisplay" class="text-3xl font-black text-teal-500">--°</div>
                </div>
            </div>

            <div class="card-premium p-6 flex flex-col justify-between aspect-square">
                <div class="flex justify-between">
                    <div id="ledIconBox" class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-2xl transition-all">⚫</div>
                    <div id="ledStatusDot" class="w-2.5 h-2.5 rounded-full bg-slate-200"></div>
                </div>
                <div>
                    <h4 class="font-bold text-lg mb-4">Iluminação</h4>
                    <button id="btnLED" onclick="toggleLED()" class="w-full py-3 bg-navy text-white rounded-xl font-bold text-xs uppercase btn-active-effect">AGUARDANDO</button>
                </div>
            </div>

            <div onclick="abrirModal('tvModal')" class="card-premium p-6 flex flex-col justify-between aspect-square cursor-pointer btn-active-effect">
                <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-2xl">📺</div>
                <h4 class="font-bold text-lg">Smart TV Remote</h4>
            </div>
        </div>
    </main>

    <div id="acModal" class="hidden fixed inset-0 modal-blur flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xs rounded-[2.5rem] shadow-2xl overflow-hidden">
            <div class="bg-navy p-10 text-center text-white relative">
                <span class="text-[10px] font-bold text-white/40 uppercase tracking-widest">Temperatura Alvo</span>
                <div class="flex justify-center items-center gap-6 mt-4">
                    <button onclick="ajustarSetpoint(-1)" class="w-12 h-12 rounded-full bg-white/10 text-2xl btn-active-effect">－</button>
                    <span id="acModalTemp" class="text-6xl font-light w-24">--</span>
                    <button onclick="ajustarSetpoint(1)" class="w-12 h-12 rounded-full bg-white/10 text-2xl btn-active-effect">＋</button>
                </div>
                <button onclick="toggleACPower()" id="acPowerBtnModal" class="absolute top-6 right-6 w-12 h-12 rounded-full border border-white/20 flex items-center justify-center btn-active-effect">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M18.364 5.636a9 9 0 11-12.728 0M12 9v4"></path></svg>
                </button>
            </div>
            <div class="p-6">
                <div class="grid grid-cols-4 gap-2 mb-6">
                    <button onclick="setACParam('ac_mode', 'cool')" id="mode_cool" class="ac-mode-btn"><span>❄️</span></button>
                    <button onclick="setACParam('ac_mode', 'dry')" id="mode_dry" class="ac-mode-btn"><span>💧</span></button>
                    <button onclick="setACParam('ac_mode', 'fan')" id="mode_fan" class="ac-mode-btn"><span>🌀</span></button>
                    <button onclick="setACParam('ac_mode', 'auto')" id="mode_auto" class="ac-mode-btn"><span>🅰️</span></button>
                </div>
                <button onclick="fecharModal('acModal')" class="w-full py-4 text-slate-400 font-bold text-[10px] uppercase tracking-widest">Fechar Painel</button>
            </div>
        </div>
    </div>

    <div id="adminDrawer" class="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl p-8">
        <div class="flex justify-between items-center mb-8">
            <h3 class="font-bold text-xs uppercase tracking-[0.2em] text-slate-400">Configuração de Hardware</h3>
            <button onclick="toggleAdmin()" class="text-slate-300">✕</button>
        </div>
        
        <label class="text-[10px] font-bold text-slate-400 uppercase block mb-2">Identificação da Unidade</label>
        <input type="text" id="cfgCliente" class="w-full bg-slate-50 border border-slate-100 p-3 rounded-xl mb-6 text-sm outline-none focus:border-teal-500" placeholder="Ex: PANORAMA SALA 01">

        <label class="text-[10px] font-bold text-slate-400 uppercase block mb-2">Protocolo IR (Marca)</label>
        <select id="cfgMarca" class="w-full bg-slate-50 border border-slate-100 p-3 rounded-xl mb-6 text-sm outline-none">
            <option value="20">Midea / Carrier / Springer</option>
            <option value="6">LG (Nativo)</option>
            <option value="3">Samsung (Nativo)</option>
            <option value="11">Panasonic</option>
            <option value="15">Gree</option>
            <option value="1">Daikin</option>
        </select>
        
        <div class="mt-10 pt-10 border-t border-slate-50 text-center">
            <p id="statusCaptura" class="text-[10px] italic text-slate-400">Sistema operando normalmente.</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLnGnSEpqacBtseenPaS8CxHtZW0iD96I",
            authDomain: "controle-led-esp-oficial.firebaseapp.com",
            databaseURL: "https://controle-led-esp-oficial-default-rtdb.firebaseio.com",
            projectId: "controle-led-esp-oficial"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        let configGlobal = { setpoint: 22, power: false, marca_ac: 20 };

        auth.onAuthStateChanged(user => {
            if (!user) { window.location.replace("index.html"); return; }
            
            // Monitoramento de Configurações
            db.ref("/config_alertas").on("value", s => {
                const val = s.val() || {};
                configGlobal = val;
                
                document.getElementById("headerCliente").innerText = val.cliente || "UNIDADE DESCONHECIDA";
                document.getElementById("acAlvoDisplay").innerText = (val.setpoint || 22) + "°";
                document.getElementById("acModalTemp").innerText = (val.setpoint || 22);
                document.getElementById("cfgMarca").value = val.marca_ac || 20;
                
                const badge = document.getElementById("badgeAC");
                badge.innerText = val.power ? "LIGADO" : "DESLIGADO";
                badge.className = val.power ? "text-[9px] font-bold px-2 py-1 rounded-full bg-teal-50 text-teal-600" : "text-[9px] font-bold px-2 py-1 rounded-full bg-rose-50 text-rose-600";
                
                document.getElementById("acPowerBtnModal").style.backgroundColor = val.power ? "#00b2a9" : "transparent";

                document.querySelectorAll('.ac-mode-btn').forEach(b => b.classList.remove('active'));
                if(val.ac_mode) document.getElementById(`mode_${val.ac_mode}`)?.classList.add('active');
            });

            // Monitoramento de Sensores
            db.ref("/telemetria").on("value", s => {
                const data = s.val() || { temperatura: 0, umidade: 0 };
                const t = parseFloat(data.temperatura) || 0;
                const h = parseFloat(data.umidade) || 0;
                
                document.getElementById("tempVal").innerText = t.toFixed(1) + "°C";
                document.getElementById("humVal").innerText = h.toFixed(0) + "%";
                
                updateGauge('tempGauge', t, 50);
                updateGauge('humGauge', h, 100);
            });

            // Monitoramento de LED
            db.ref("/led").on("value", s => {
                const v = s.val();
                const btn = document.getElementById("btnLED");
                btn.innerText = v == 1 ? "DESLIGAR" : "LIGAR";
                btn.style.background = v == 1 ? "#00b2a9" : "#002b49";
                document.getElementById("ledIconBox").innerText = v == 1 ? "💡" : "⚫";
                document.getElementById("ledStatusDot").className = v == 1 ? "w-2.5 h-2.5 rounded-full bg-teal-400 animate-pulse" : "w-2.5 h-2.5 rounded-full bg-slate-200";
            });
        });

        // Funções de Comando
        function setACParam(key, value) {
            let update = {};
            // Garante que números sejam números antes de enviar ao Firebase
            if(key === 'setpoint' || key === 'marca_ac') value = parseInt(value);
            
            update[key] = value;
            db.ref("/config_alertas").update(update).then(() => {
                // Dispara o gatilho único para o ESP32 agir
                db.ref("/ir_system/execute").set("ac_update_" + Date.now());
            });
        }

        function ajustarSetpoint(diff) {
            const novo = (configGlobal.setpoint || 22) + diff;
            if(novo >= 16 && novo <= 30) setACParam('setpoint', novo);
        }

        function toggleACPower() { setACParam('power', !configGlobal.power); }
        
        function toggleLED() {
            db.ref("/led").once("value", s => db.ref("/led").set(s.val() == 1 ? 0 : 1));
        }

        function updateGauge(id, val, max) {
            const g = document.getElementById(id);
            if(!g) return;
            const circum = 126;
            const offset = circum - (val / max) * circum;
            g.style.strokeDasharray = `${circum - offset} ${circum}`;
        }

        // Interface
        const abrirModal = (id) => document.getElementById(id).classList.remove('hidden');
        const fecharModal = (id) => document.getElementById(id).classList.add('hidden');
        const toggleAdmin = () => document.getElementById("adminDrawer").classList.toggle('open');
        
        document.getElementById("logoAdmin").onclick = () => {
            this.cliques = (this.cliques || 0) + 1;
            if(this.cliques >= 5) { toggleAdmin(); this.cliques = 0; }
            setTimeout(() => this.cliques = 0, 3000);
        };

        function fazerLogout() { auth.signOut().then(() => window.location.replace("index.html")); }

        document.getElementById("cfgCliente").onchange = (e) => db.ref("/config_alertas").update({ cliente: e.target.value });
        document.getElementById("cfgMarca").onchange = (e) => setACParam('marca_ac', e.target.value);
    </script>
</body>
</html>

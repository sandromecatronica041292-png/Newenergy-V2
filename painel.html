<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewEnergy | Monitor Pro Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        :root { --navy: #002b49; --green: #00b2a9; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: var(--navy); overflow-x: hidden; }
        .btn-active-effect:active { transform: scale(0.96); filter: brightness(1.2); transition: all 0.1s ease; }
        .card-premium { background: white; border-radius: 1.25rem; border: 1px solid #e2e8f0; transition: all 0.2s ease; }
        .gauge-container { position: relative; width: 120px; height: 65px; overflow: hidden; }
        .gauge-bg { fill: none; stroke: #f1f5f9; stroke-width: 10; }
        .gauge-fill { fill: none; stroke: var(--green); stroke-width: 10; stroke-linecap: round; transition: stroke-dasharray 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-blur { backdrop-filter: blur(12px); background: rgba(0, 43, 73, 0.4); z-index: 60; }
        .btn-tv { @apply bg-slate-100 text-slate-700 rounded-xl font-bold text-[11px] py-3 flex items-center justify-center transition-all; box-shadow: 0 4px 0 #cbd5e1; }
        .btn-tv:active { transform: translateY(3px); box-shadow: 0 1px 0 #cbd5e1; background-color: #e2e8f0; }
        #adminDrawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); z-index: 100; }
        #adminDrawer.open { transform: translateX(0); }
        .label-tiny { font-size: 0.6rem !important; text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em; color: #64748b; }
        .admin-input { @apply w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm mb-3 outline-none focus:border-[#00b2a9]; }
        
        .ac-mode-btn { @apply flex flex-col items-center gap-1.5 p-2 rounded-2xl transition-all btn-active-effect text-slate-500 bg-slate-50; border: 2px solid transparent; }
        .ac-mode-btn.active { @apply bg-[#002b49] text-[#00b2a9] border-[#00b2a9]; transform: scale(1.05); }
        .ac-icon-circle { @apply w-11 h-11 bg-white rounded-full flex items-center justify-center border border-slate-100; }
        .ac-mode-btn.active .ac-icon-circle { @apply bg-white/10 border-none; }
    </style>
</head>
<body class="pb-10">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
            <div class="flex items-center gap-3 cursor-pointer" id="logoAdmin">
                <div class="w-7 h-7 bg-[#002b49] flex items-center justify-center rounded-lg">
                     <svg class="w-4 h-4 text-[#00b2a9]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <div>
                    <h1 class="font-bold text-base tracking-tight leading-none">NewEnergy</h1>
                    <span id="headerCliente" class="text-[9px] text-slate-400 font-medium">CARREGANDO...</span>
                </div>
            </div>
            <button onclick="fazerLogout()" class="text-[10px] font-black text-rose-500 btn-active-effect">SAIR</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 mt-6">
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="card-premium p-4 flex flex-col items-center shadow-sm">
                <span class="label-tiny mb-2">TEMPERATURA</span>
                <div class="gauge-container"><svg viewBox="0 0 100 50"><path class="gauge-bg" d="M10 45 A 35 35 0 0 1 90 45" /><path id="tempGauge" class="gauge-fill" d="M10 45 A 35 35 0 0 1 90 45" stroke-dasharray="0 126" /></svg></div>
                <h2 id="tempVal" class="text-2xl font-extrabold mt-[-15px]">--°C</h2>
            </div>
            <div class="card-premium p-4 flex flex-col items-center shadow-sm">
                <span class="label-tiny mb-2">UMIDADE</span>
                <div class="gauge-container"><svg viewBox="0 0 100 50"><path class="gauge-bg" d="M10 45 A 35 35 0 0 1 90 45" /><path id="humGauge" class="gauge-fill" d="M10 45 A 35 35 0 0 1 90 45" stroke-dasharray="0 126" style="stroke: #3b82f6;" /></svg></div>
                <h2 id="humVal" class="text-2xl font-extrabold mt-[-15px]">--%</h2>
            </div>
        </div>

        <div id="drag-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="card-premium p-5 flex flex-col justify-between aspect-square cursor-grab" data-id="luz">
                <div class="flex justify-between items-start">
                     <div id="ledIconBox" class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center transition-all"><span id="ledEmoji" class="text-xl">⚫</span></div>
                    <div id="ledStatusDot" class="w-2.5 h-2.5 rounded-full bg-slate-200"></div>
                </div>
                <div>
                    <h4 class="text-sm font-bold">Iluminação</h4>
                    <span class="label-tiny block mb-3">SALA PRINCIPAL</span>
                    <button id="btnLED" onclick="toggleLED()" class="w-full py-2.5 bg-navy text-white rounded-lg font-bold text-[10px] uppercase tracking-widest btn-active-effect">AGUARDANDO...</button>
                </div>
            </div>

            <div onclick="abrirModal('acModal')" class="card-premium p-5 flex flex-col justify-between aspect-square btn-active-effect cursor-pointer" data-id="ac">
                <div class="flex justify-between items-start">
                    <div class="w-10 h-10 bg-emerald-50 text-[#00b2a9] rounded-xl flex items-center justify-center"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg></div>
                    <span id="badgeAC" class="label-tiny bg-slate-50 px-2 py-0.5 rounded-md">STATUS</span>
                </div>
                <div>
                    <h4 class="text-sm font-bold">Ar Condicionado</h4>
                    <div class="text-2xl font-black text-[#00b2a9] mt-1" id="acAlvoDisplay">--°</div>
                </div>
            </div>

            <div onclick="abrirModal('tvModal')" class="card-premium p-5 flex flex-col justify-between aspect-square btn-active-effect cursor-pointer" data-id="tv">
                <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M7 4V2M17 4V2M3 8h18v10a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"></path></svg></div>
                <div><h4 class="text-sm font-bold">Smart TV Remote</h4><p class="text-[10px] text-blue-500 font-bold mt-1 uppercase tracking-tighter">Abrir Interface</p></div>
            </div>
        </div>
    </main>

    <div id="acModal" class="hidden fixed inset-0 modal-blur flex items-center justify-center p-4 z-[70]">
        <div class="bg-white w-full max-w-xs rounded-3xl shadow-2xl overflow-hidden">
            <div class="bg-[#002b49] p-8 text-center text-white relative">
                <span class="label-tiny text-white/50">AJUSTE DE CLIMATIZAÇÃO</span>
                <div class="flex justify-center items-center gap-6 mt-4">
                    <button onclick="ajustarSetpoint(-1)" class="w-14 h-14 !rounded-full bg-white/10 text-white active:bg-white/20 transition-all text-xl">－</button>
                    <span id="acModalTemp" class="text-5xl font-light w-20">--°</span>
                    <button onclick="ajustarSetpoint(1)" class="w-14 h-14 !rounded-full bg-white/10 text-white active:bg-white/20 transition-all text-xl">＋</button>
                </div>
                <button onclick="toggleACPower()" id="acPowerBtnModal" class="absolute top-6 right-6 w-10 h-10 rounded-full flex items-center justify-center border border-white/20 btn-active-effect"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M18.364 5.636a9 9 0 11-12.728 0M12 9v4"></path></svg></button>
            </div>
            <div class="p-6">
                <h5 class="label-tiny mb-3 text-center">Modo de Operação</h5>
                <div class="grid grid-cols-4 gap-2 mb-6">
                    <button onclick="setACParam('ac_mode', 'cool')" id="mode_cool" class="ac-mode-btn"><div class="ac-icon-circle">❄️</div><span class="ac-label text-[10px] font-bold">Frio</span></button>
                    <button onclick="setACParam('ac_mode', 'dry')" id="mode_dry" class="ac-mode-btn"><div class="ac-icon-circle">💧</div><span class="ac-label text-[10px] font-bold">Seco</span></button>
                    <button onclick="setACParam('ac_mode', 'fan')" id="mode_fan" class="ac-mode-btn"><div class="ac-icon-circle">🌀</div><span class="ac-label text-[10px] font-bold">Vent</span></button>
                    <button onclick="setACParam('ac_mode', 'auto')" id="mode_auto" class="ac-mode-btn"><div class="ac-icon-circle">🅰️</div><span class="ac-label text-[10px] font-bold">Auto</span></button>
                </div>
                <button onclick="fecharModal('acModal')" class="w-full py-4 text-slate-400 text-[10px] font-bold tracking-widest mt-4">FECHAR</button>
            </div>
        </div>
    </div>

    <div id="tvModal" class="hidden fixed inset-0 modal-blur flex items-center justify-center p-4 z-[70]">
        <div class="bg-white w-full max-w-xs rounded-3xl shadow-2xl overflow-hidden p-6">
            <div class="text-center mb-6">
                <span class="label-tiny">Controle Smart TV</span>
                <div class="flex justify-center mt-4">
                    <button onclick="sendIR('tv_power')" class="w-14 h-14 bg-rose-500 text-white rounded-full flex items-center justify-center shadow-lg btn-active-effect"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg></button>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-3 mb-6">
                <button onclick="sendIR('tv_vol_up')" class="btn-tv">VOL +</button>
                <button onclick="sendIR('tv_mute')" class="btn-tv">MUTE</button>
                <button onclick="sendIR('tv_ch_up')" class="btn-tv">CH +</button>
                <button onclick="sendIR('tv_vol_down')" class="btn-tv">VOL -</button>
                <button onclick="sendIR('tv_input')" class="btn-tv">INPUT</button>
                <button onclick="sendIR('tv_ch_down')" class="btn-tv">CH -</button>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button onclick="sendIR('tv_netflix')" class="py-3 bg-slate-800 text-white rounded-xl font-bold text-[10px] btn-active-effect">NETFLIX</button>
                <button onclick="sendIR('tv_youtube')" class="py-3 bg-rose-600 text-white rounded-xl font-bold text-[10px] btn-active-effect">YOUTUBE</button>
            </div>
            <button onclick="fecharModal('tvModal')" class="w-full py-2 text-slate-400 text-[10px] font-bold tracking-widest mt-2 uppercase">FECHAR</button>
        </div>
    </div>

    <div id="adminDrawer" class="fixed top-0 right-0 h-full w-72 bg-white shadow-2xl p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-8"><h3 class="font-bold text-lg text-navy">Engenharia</h3><button onclick="toggleAdmin()" class="text-slate-400">✕</button></div>
        
        <label class="label-tiny">Cliente / Unidade</label>
        <input type="text" id="cfgCliente" class="admin-input" placeholder="Ex: PANORAMA - SALA 01">

        <label class="label-tiny">Protocolo do Ar (IR Universal)</label>
        <select id="cfgMarca" class="admin-input">
            <option value="20">Midea / Carrier / Springer</option>
            <option value="19">Philco / Elgin / Silvermaxx</option>
            <option value="6">LG</option>
            <option value="15">Gree</option>
            <option value="31">TCL</option>
            <option value="3">Samsung</option>
            <option value="36">Consul / Brastemp</option>
            <option value="34">Electrolux</option>
        </select>

        <div class="mt-8 pt-4 border-t border-slate-100">
            <h4 class="label-tiny mb-4 text-emerald-600">Captura de Controles (IR)</h4>
            <div class="grid grid-cols-2 gap-2" id="gridCaptura">
                <button onclick="iniciarCaptura('tv_power')" class="text-[9px] bg-slate-50 p-2 rounded border hover:bg-emerald-50 transition-colors">Gravar POWER</button>
                <button onclick="iniciarCaptura('tv_mute')" class="text-[9px] bg-slate-50 p-2 rounded border hover:bg-emerald-50 transition-colors">Gravar MUTE</button>
                <button onclick="iniciarCaptura('tv_vol_up')" class="text-[9px] bg-slate-50 p-2 rounded border hover:bg-emerald-50 transition-colors">Gravar VOL +</button>
                <button onclick="iniciarCaptura('tv_vol_down')" class="text-[9px] bg-slate-50 p-2 rounded border hover:bg-emerald-50 transition-colors">Gravar VOL -</button>
                <button onclick="iniciarCaptura('tv_ch_up')" class="text-[9px] bg-slate-50 p-2 rounded border hover:bg-emerald-50 transition-colors">Gravar CH +</button>
                <button onclick="iniciarCaptura('tv_ch_down')" class="text-[9px] bg-slate-50 p-2 rounded border hover:bg-emerald-50 transition-colors">Gravar CH -</button>
                <button onclick="iniciarCaptura('tv_input')" class="text-[9px] bg-slate-50 p-2 rounded border hover:bg-emerald-50 transition-colors">Gravar INPUT</button>
                <button onclick="iniciarCaptura('tv_netflix')" class="text-[9px] bg-slate-50 p-2 rounded border hover:bg-emerald-50 transition-colors">Gravar NETFLIX</button>
                <button onclick="iniciarCaptura('tv_youtube')" class="text-[9px] bg-slate-50 p-2 rounded border hover:bg-emerald-50 transition-colors">Gravar YOUTUBE</button>
            </div>
            <p id="statusCaptura" class="text-[8px] mt-4 text-slate-400 italic text-center">Aguardando comando...</p>
        </div>
    </div>

    <script>
        // Configuração Firebase
        firebase.initializeApp({
            apiKey: "AIzaSyCLnGnSEpqacBtseenPaS8CxHtZW0iD96I",
            authDomain: "controle-led-esp-oficial.firebaseapp.com",
            databaseURL: "https://controle-led-esp-oficial-default-rtdb.firebaseio.com",
            projectId: "controle-led-esp-oficial"
        });

        const db = firebase.database();
        const auth = firebase.auth();
        let config = { setpoint: 22, power: false, marca_ac: 20, ac_mode: "cool" };

        // Observadores de Estado
        auth.onAuthStateChanged(user => {
            if (!user) { window.location.replace("index.html"); return; }

            // Configurações do Ar e Unidade
            db.ref("/config_alertas").on("value", s => {
                const val = s.val() || {}; 
                config = {...config, ...val};
                document.getElementById("headerCliente").innerText = val.cliente || "UNIDADE OFFLINE";
                document.getElementById("acAlvoDisplay").innerText = (val.setpoint || 22) + "°";
                document.getElementById("acModalTemp").innerText = (val.setpoint || 22) + "°";
                document.getElementById("cfgCliente").value = val.cliente || "";
                document.getElementById("cfgMarca").value = val.marca_ac || 20;
                
                const badge = document.getElementById("badgeAC");
                badge.innerText = val.power ? "LIGADO" : "DESLIGADO";
                badge.className = val.power ? "label-tiny bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded-md" : "label-tiny bg-rose-50 text-rose-600 px-2 py-0.5 rounded-md";
                document.getElementById("acPowerBtnModal").style.backgroundColor = val.power ? "#00b2a9" : "transparent";

                document.querySelectorAll('.ac-mode-btn').forEach(b => b.classList.remove('active'));
                if(val.ac_mode) document.getElementById(`mode_${val.ac_mode}`)?.classList.add('active');
            });

            // Telemetria
            db.ref("/telemetria/temperatura").on("value", s => {
                const v = parseFloat(s.val()) || 0;
                document.getElementById("tempVal").innerText = v.toFixed(1) + "°C";
                updateGauge('tempGauge', v, 50);
            });

            db.ref("/telemetria/umidade").on("value", s => {
                const v = parseFloat(s.val()) || 0;
                document.getElementById("humVal").innerText = v.toFixed(0) + "%";
                updateGauge('humGauge', v, 100);
            });

            // Status da Luz (LED)
            db.ref("/led").on("value", s => {
                const estado = s.val();
                const btn = document.getElementById("btnLED");
                btn.innerText = estado == 1 ? "DESLIGAR" : "LIGAR";
                btn.style.backgroundColor = estado == 1 ? "#00b2a9" : "#002b49";
                document.getElementById("ledStatusDot").className = estado == 1 ? "w-2.5 h-2.5 rounded-full bg-[#00b2a9] animate-pulse" : "w-2.5 h-2.5 rounded-full bg-slate-200";
                document.getElementById("ledEmoji").innerText = estado == 1 ? "💡" : "⚫";
            });
        });

        // Funções de Controle
        function updateGauge(id, val, max) {
            const gauge = document.getElementById(id);
            if(!gauge) return;
            const circumference = 126;
            const percentage = Math.min(val / max, 1);
            gauge.style.strokeDasharray = `${circumference * percentage} ${circumference}`;
        }

        function setACParam(key, value) {
            let update = {};
            update[key] = value;
            db.ref("/config_alertas").update(update).then(() => {
                db.ref("/ir_system/execute").set({ command: "ac_update", ts: firebase.database.ServerValue.TIMESTAMP });
            });
        }

        function iniciarCaptura(funcao) {
            const status = document.getElementById("statusCaptura");
            status.innerText = `ESP32 EM MODO ESCUTA: ACIONE O ${funcao.replace('tv_', '').toUpperCase()}...`;
            status.classList.remove("text-slate-400");
            status.classList.add("text-emerald-500", "font-bold");
            
            db.ref("/ir_system/execute").set({ 
                command: "learn_mode", 
                target: funcao, 
                ts: firebase.database.ServerValue.TIMESTAMP 
            });

            // Limpa o aviso após 15 segundos (tempo de timeout do ESP)
            setTimeout(() => {
                status.innerText = "Aguardando comando...";
                status.classList.replace("text-emerald-500", "text-slate-400");
                status.classList.remove("font-bold");
            }, 15000);
        }

        // Handlers de UI
        function toggleACPower() { setACParam('power', !config.power); }
        function ajustarSetpoint(v) { 
            const novo = (config.setpoint || 22) + v;
            if (novo >= 16 && novo <= 30) setACParam('setpoint', novo);
        }
        function sendIR(cmd) { 
            db.ref("/ir_system/execute").set({ 
                command: cmd, 
                ts: firebase.database.ServerValue.TIMESTAMP 
            }); 
        }
        function toggleLED() { 
            db.ref("/led").once("value").then(s => db.ref("/led").set(s.val() == 1 ? 0 : 1)); 
        }
        
        // Modais e Admin
        const abrirModal = (id) => document.getElementById(id).classList.remove('hidden');
        const fecharModal = (id) => document.getElementById(id).classList.add('hidden');
        const toggleAdmin = () => document.getElementById("adminDrawer").classList.toggle('open');
        function fazerLogout() { auth.signOut().then(() => window.location.replace("index.html")); }

        // Salvamento de Configurações Admin
        document.getElementById("cfgCliente").addEventListener('change', (e) => {
            db.ref("/config_alertas").update({ cliente: e.target.value });
        });
        document.getElementById("cfgMarca").addEventListener('change', (e) => {
            db.ref("/config_alertas").update({ marca_ac: parseInt(e.target.value) });
        });

        // Clique secreto na logo para Admin
        let cliques = 0;
        document.getElementById("logoAdmin").onclick = () => {
            cliques++;
            if(cliques >= 5) { toggleAdmin(); cliques = 0; }
            setTimeout(() => cliques = 0, 3000);
        };

        // Arrastar cards
        Sortable.create(document.getElementById('drag-container'), { animation: 250, ghostClass: 'opacity-50' });
    </script>
</body>
</html>

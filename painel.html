<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NewEnergy | Monitor Pro Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root { 
    --brand-primary: #1a365d; --brand-accent: #007aff; --bg-body: #f1f5f9; 
    --card-bg: #ffffff; --on: #10b981; --off: #e11d48; --text-muted: #64748b; 
  }
  
  body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-body); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
  
  .card { background: var(--card-bg); border-radius: 20px; padding: 35px; width: 100%; max-width: 440px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; position: relative; }

  /* CABEÇALHO */
  .logo-principal { font-size: 18px; text-transform: uppercase; letter-spacing: 3px; font-weight: 900; color: var(--brand-primary); cursor: pointer; margin-bottom: 25px; display: block; }

  /* TELAS SOBREPOSTAS (CORRIGIDO) */
  .full-screen-panel { 
    display: none; 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    background: #ffffff; 
    z-index: 9999; /* Garante que fique na frente de tudo */
    flex-direction: column; 
    padding: 40px 25px; 
    box-sizing: border-box; 
    overflow-y: auto;
  }

  /* BOTÕES E INPUTS */
  .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 12px; text-transform: uppercase; transition: 0.2s; }
  .btn-primary { background: var(--brand-primary); color: #fff; }
  .btn-accent { background: var(--brand-accent); color: #fff; }
  .btn-outline { background: none; border: 1.5px solid #ddd; color: var(--text-muted); }
  
  .admin-input { background: #f8fafc; border: 1.5px solid #e2e8f0; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 20px; font-size: 14px; box-sizing: border-box; outline: none; }
  label { font-size: 11px; color: var(--text-muted); font-weight: 700; text-align: left; display: block; margin-bottom: 5px; text-transform: uppercase; }

  /* DISPLAY DE SENSORES */
  .sensor-display { margin-bottom: 30px; }
  .temp-main { font-size: 48px; font-weight: 900; color: var(--brand-primary); margin: 0; }
  .hum-sub { font-size: 18px; color: var(--text-muted); margin-top: -5px; }

  .ir-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
</style>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="card">
  <span class="logo-principal" id="logoAdmin">NewEnergy</span>
  
  <div class="sensor-display">
    <h1 id="tempVal" class="temp-main">--°C</h1>
    <div id="humVal" class="hum-sub">Umidade: --%</div>
  </div>

  <button id="btnLED" class="btn-action btn-outline">Ligar Iluminação</button>
  <button class="btn-action btn-accent" onclick="abrir('acPanel')">Climatização (Ar)</button>
  <button class="btn-action btn-outline" onclick="window.location.href='historico.html'">Relatórios</button>

  <div id="acPanel" class="full-screen-panel">
    <div class="logo-principal">Controle de Ar</div>
    <div id="statusAC" style="font-size:12px; font-weight:700; margin-bottom:20px; color:var(--brand-accent)">MODO MANUAL</div>

    <div class="ir-grid">
        <button class="btn-action btn-primary" onclick="sendIR('on')">Ligar</button>
        <button class="btn-action" style="background:var(--off); color:#fff;" onclick="sendIR('off')">Desligar</button>
    </div>
    
    <button class="btn-action btn-outline" onclick="fechar('acPanel')" style="margin-top: auto;">Sair / Voltar</button>
  </div>

  <div id="adminPanel" class="full-screen-panel">
    <div class="logo-principal">Configurações</div>
    
    <div style="text-align: left;">
        <label>Nome do Cliente / Unidade</label>
        <input type="text" id="cfgCliente" class="admin-input" placeholder="Ex: Hospital Unimed">
        
        <label>Configurar Infravermelho (Learn)</label>
        <div class="ir-grid">
            <button class="btn-action btn-outline" style="font-size:10px;" onclick="startLearn('on')">Gravar On</button>
            <button class="btn-action btn-outline" style="font-size:10px;" onclick="startLearn('off')">Gravar Off</button>
        </div>
    </div>

    <div style="margin-top: auto;">
        <button class="btn-action btn-primary" onclick="salvarAdmin()">Salvar e Sair</button>
        <button class="btn-action btn-outline" onclick="fechar('adminPanel')">Cancelar</button>
    </div>
  </div>
</div>

<script>
// CONFIGURAÇÃO FIREBASE
firebase.initializeApp({
   databaseURL: "https://controle-led-esp-oficial-default-rtdb.firebaseio.com",
});
const db = firebase.database();

// --- FUNÇÕES DE NAVEGAÇÃO ---
function abrir(id) {
    document.getElementById(id).style.display = "flex";
}

function fechar(id) {
    document.getElementById(id).style.display = "none";
}

// --- LOGICA DE ADMIN ---
function salvarAdmin() {
    const cliente = document.getElementById("cfgCliente").value;
    db.ref("/config_alertas").update({
        cliente: cliente
    }).then(() => {
        alert("Configurações atualizadas!");
        fechar('adminPanel');
    });
}

function startLearn(funcao) {
    db.ref("/ir_system/learn").set({
        active: true,
        function: funcao,
        ts: Date.now()
    });
    alert("MODO APRENDER: Aponte o controle e pressione " + funcao.toUpperCase());
}

// --- LOGICA DE COMANDOS ---
function sendIR(comando) {
    db.ref("/ir_system/execute").set({
        command: comando,
        ts: Date.now()
    });
    const status = document.getElementById("statusAC");
    status.innerText = "ENVIANDO SINAL...";
    setTimeout(() => status.innerText = "MODO MANUAL", 2000);
}

// ATIVAÇÃO ADMIN (5 CLIQUES NO LOGO)
let cliques = 0;
document.getElementById("logoAdmin").onclick = () => {
    cliques++;
    if(cliques >= 5) {
        abrir('adminPanel');
        cliques = 0;
    }
};

// --- SINCRONIZAÇÃO EM TEMPO REAL ---
db.ref("/temp").on("value", s => document.getElementById("tempVal").innerText = (s.val() || "--") + "°C");
db.ref("/hum").on("value", s => document.getElementById("humVal").innerText = "Umidade: " + (s.val() || "--") + "%");

db.ref("/led").on("value", s => {
    const btn = document.getElementById("btnLED");
    const ligado = s.val() == 1;
    btn.innerText = ligado ? "LUZ LIGADA" : "LIGAR ILUMINAÇÃO";
    btn.style.background = ligado ? "var(--brand-primary)" : "none";
    btn.style.color = ligado ? "#fff" : "var(--text-muted)";
});

document.getElementById("btnLED").onclick = () => {
    db.ref("/led").once('value', s => {
        db.ref("/led").set(s.val() == 1 ? 0 : 1);
    });
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewEnergy | Monitor Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body { background:#f8fafc; font-family: Arial; }
.card { background:white; border-radius:16px; padding:16px; }
</style>
</head>

<body class="p-4">

<h1 class="text-xl font-bold mb-4">NewEnergy Control</h1>

<!-- TEMPERATURA -->
<div class="card mb-4">
<h2>Temperatura</h2>
<p id="temp">--</p>
</div>

<!-- UMIDADE -->
<div class="card mb-4">
<h2>Umidade</h2>
<p id="hum">--</p>
</div>

<!-- LED -->
<div class="card mb-4">
<button onclick="toggleLED()" id="btnLED">Ligar Luz</button>
</div>

<!-- AR -->
<div class="card mb-4">
<h2>Ar Condicionado</h2>

<p id="setpoint">22°</p>

<button onclick="mudarTemp(-1)">-</button>
<button onclick="mudarTemp(1)">+</button>

<br><br>

<button onclick="sendIR('ac_on')">Ligar</button>
<button onclick="sendIR('ac_off')">Desligar</button>
</div>

<!-- TV -->
<div class="card mb-4">
<h2>TV</h2>

<button onclick="sendIR('tv_power')">Power</button>
<button onclick="sendIR('tv_vol_up')">Vol +</button>
<button onclick="sendIR('tv_vol_down')">Vol -</button>
</div>

<script>
firebase.initializeApp({
apiKey: "SUA_API",
authDomain: "SEU_DOMINIO",
databaseURL: "https://controle-led-esp-oficial-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let setpoint = 22;

// 🔥 TEMPERATURA REALTIME
db.ref("/temp").on("value", s => {
document.getElementById("temp").innerText = s.val() + " °C";
});

// 🔥 UMIDADE REALTIME
db.ref("/hum").on("value", s => {
document.getElementById("hum").innerText = s.val() + " %";
});

// 🔥 LED
db.ref("/led").on("value", s => {
const estado = s.val();
document.getElementById("btnLED").innerText = estado ? "Desligar Luz" : "Ligar Luz";
});

// 🔥 SETPOINT
db.ref("/config_alertas/setpoint").on("value", s => {
setpoint = s.val() || 22;
document.getElementById("setpoint").innerText = setpoint + "°";
});

// 🔥 FUNÇÕES

function toggleLED(){
db.ref("/led").once("value").then(s=>{
db.ref("/led").set(s.val() ? 0 : 1);
});
}

function sendIR(cmd){
db.ref("/ir_system/execute").set({
command: cmd,
ts: Date.now()
});
}

function mudarTemp(valor){

let novo = setpoint + valor;

// 🔥 LIMITE SEGURO
if(novo < 16) novo = 16;
if(novo > 30) novo = 30;

db.ref("/config_alertas/setpoint").set(novo);

// 🔥 ENVIA COMANDO REAL
if(valor > 0){
sendIR("ac_temp_up");
}else{
sendIR("ac_temp_down");
}

}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewEnergy • Painel</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{margin:0;padding:0;font-family:Arial,sans-serif;background:#000;color:white;}
header{background:#111;padding:10px;text-align:center;font-size:18px;color:#f1c40f;border-bottom:1px solid #222;}
.container{padding:10px;max-width:800px;margin:auto;display:flex;flex-direction:column;gap:15px;}
.card{background:#111;padding:12px;border-radius:10px;border:1px solid #333;box-shadow:0 0 6px rgba(255,255,0,0.1);}
.card h3{margin-bottom:10px;font-size:16px;color:#f1c40f;}
.status-online{color:#4cff4c;font-weight:bold;font-size:14px;}
.status-offline{color:#ff5757;font-weight:bold;font-size:14px;}
canvas{width:100%!important;height:200px!important;display:block;margin:auto;}
button{width:100%;padding:10px;background:#f1c40f;border:none;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer;color:#000;margin-top:5px;}
button:hover{background:#ffe35a;}
table{width:100%;border-collapse:collapse;margin-top:10px;color:white;}
th, td{padding:8px;border:1px solid #333;text-align:center;}
select{width:100%;padding:6px;margin-top:5px;border-radius:6px;border:none;background:#222;color:#fff;font-size:14px;}
</style>
</head>
<body>
<header>Painel de Controle • NewEnergy</header>
<div class="container">

<div class="card"><h3>Status do Dispositivo</h3><p id="status" class="status-offline">Offline</p></div>

<div class="card">
  <h3>Sensores</h3>
  <canvas id="gaugeTemp"></canvas><br>
  <canvas id="gaugeUmid"></canvas>
</div>

<div class="card">
  <h3>Controle do LED</h3>
  <button id="btnLED">Ligar / Desligar LED</button>
</div>

<div class="card">
  <h3>Monitoramento Histórico</h3>
  <select id="periodo">
    <option value="diario">Diário</option>
    <option value="semanal">Semanal</option>
    <option value="mensal">Mensal</option>
    <option value="anual">Anual</option>
  </select>
  <canvas id="graficoHistorico"></canvas>
  <table id="tabelaHistorico">
    <thead>
      <tr><th>Data</th><th>Temperatura (°C)</th><th>Umidade (%)</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyAEgLyJ6i2ZaSNnBrLMoe2ajInd4MGKHIs",
  authDomain:"controle-led-esp-oficial.firebaseapp.com",
  databaseURL:"https://controle-led-esp-oficial-default-rtdb.firebaseio.com",
  projectId:"controle-led-esp-oficial",
  storageBucket:"controle-led-esp-oficial.firebasestorage.app",
  messagingSenderId:"1082980860084",
  appId:"1:1082980860084:web:b3b669b8f1801c3d6657e1"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const ctxTemp = document.getElementById("gaugeTemp");
const gaugeTemp = new Chart(ctxTemp,{
    type:"doughnut",
    data:{labels:["Temp"],datasets:[{data:[0,100],backgroundColor:["#ff3b3b","#222"],borderWidth:0}]},
    options:{circumference:180,rotation:270,cutout:"80%",plugins:{legend:{display:false}}}
});

const ctxUmid = document.getElementById("gaugeUmid");
const gaugeUmid = new Chart(ctxUmid,{
    type:"doughnut",
    data:{labels:["Umid"],datasets:[{data:[0,100],backgroundColor:["#3498db","#222"],borderWidth:0}]},
    options:{circumference:180,rotation:270,cutout:"80%",plugins:{legend:{display:false}}}
});

const ctxHistorico = document.getElementById("graficoHistorico");
let graficoHistorico = new Chart(ctxHistorico,{
    type:"line",
    data:{labels:[], datasets:[
        {label:"Temperatura (°C)", data:[], borderColor:"#ff3b3b", backgroundColor:"rgba(255,59,59,0.2)", tension:0.3},
        {label:"Umidade (%)", data:[], borderColor:"#3498db", backgroundColor:"rgba(52,152,219,0.2)", tension:0.3}
    ]},
    options:{plugins:{legend:{labels:{color:"#fff"}}},scales:{x:{ticks:{color:"#fff"}},y:{ticks:{color:"#fff"}}}}
});

const statusEl = document.getElementById("status");
const btnLED = document.getElementById("btnLED");
const periodoEl = document.getElementById("periodo");
const tabelaBody = document.querySelector("#tabelaHistorico tbody");

let ledState = false;
let espID = "";

// Usuário logado
auth.onAuthStateChanged(user=>{
    if(user){
        const uid = user.uid;
        db.ref("/usuarios/"+uid+"/esp32ID").once("value").then(snapshot=>{
            espID = snapshot.val();
            if(!espID){alert("Nenhum ESP32 vinculado!"); return;}
            
            // Atualiza dados em tempo real
            db.ref("/esp32/"+espID).on("value", snapshot=>{
                const data = snapshot.val();
                if(data){
                    const temp = data.temperatura;
                    const umid = data.umidade;

                    gaugeTemp.data.datasets[0].data[0] = temp;
                    gaugeTemp.data.datasets[0].data[1] = 100-temp;
                    gaugeTemp.update();

                    gaugeUmid.data.datasets[0].data[0] = umid;
                    gaugeUmid.data.datasets[0].data[1] = 100-umid;
                    gaugeUmid.update();

                    statusEl.innerText="Online"; statusEl.className="status-online";

                    ledState = data.led;
                    btnLED.innerText = ledState?"Desligar LED":"Ligar LED";
                } else {
                    statusEl.innerText="Offline"; statusEl.className="status-offline";
                }
            });

            // Atualiza histórico
            function atualizarHistorico(periodo){
                db.ref("/historico/"+espID).once("value").then(snapshot=>{
                    const data = snapshot.val();
                    if(!data) return;

                    let labels = [], tempData=[], umidData=[];
                    let rows = [];
                    const agora = new Date();

                    for(const key in data){
                        const item = data[key];
                        const dt = new Date(item.timestamp);
                        let incluir=false;

                        switch(periodo){
                            case "diario": incluir = dt.toDateString()===agora.toDateString(); break;
                            case "semanal": const semanaInicio=new Date(agora); semanaInicio.setDate(agora.getDate()-7); incluir = dt>=semanaInicio; break;
                            case "mensal": incluir = dt.getMonth()===agora.getMonth() && dt.getFullYear()===agora.getFullYear(); break;
                            case "anual": incluir = dt.getFullYear()===agora.getFullYear(); break;
                        }

                        if(incluir){
                            labels.push(dt.toLocaleString());
                            tempData.push(item.temperatura);
                            umidData.push(item.umidade);
                            rows.push(`<tr><td>${dt.toLocaleString()}</td><td>${item.temperatura}</td><td>${item.umidade}</td></tr>`);
                        }
                    }

                    graficoHistorico.data.labels=labels;
                    graficoHistorico.data.datasets[0].data=tempData;
                    graficoHistorico.data.datasets[1].data=umidData;
                    graficoHistorico.update();

                    tabelaBody.innerHTML = rows.join("");
                });
            }

            atualizarHistorico(periodoEl.value);
            periodoEl.addEventListener("change", ()=>atualizarHistorico(periodoEl.value));
        });
    } else {
        alert("Usuário não logado!");
        window.location.href="index.html";
    }
});

// Controle LED
btnLED.addEventListener("click", ()=>{
    if(!espID) return;
    ledState = !ledState;
    db.ref("/esp32/"+espID+"/led").set(ledState);
    btnLED.innerText = ledState?"Desligar LED":"Ligar LED";
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewEnergy • Painel</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{margin:0;padding:0;font-family:Arial,sans-serif;background:#000;color:white;}
header{background:#111;padding:10px;text-align:center;font-size:18px;color:#f1c40f;border-bottom:1px solid #222;}
.container{padding:10px;max-width:800px;margin:auto;display:flex;flex-direction:column;gap:15px;}
.card{background:#111;padding:12px;border-radius:10px;border:1px solid #333;box-shadow:0 0 6px rgba(255,255,0,0.1);}
.card h3{margin-bottom:10px;font-size:16px;color:#f1c40f;}
.status-online{color:#4cff4c;font-weight:bold;font-size:14px;}
.status-offline{color:#ff5757;font-weight:bold;font-size:14px;}
canvas{width:100%!important;height:200px!important;display:block;margin:auto;}
button{width:100%;padding:10px;background:#f1c40f;border:none;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer;color:#000;margin-top:5px;}
button:hover{background:#ffe35a;}
.alertas{display:flex;justify-content:space-around;margin-top:10px;}
.alerta{background:#222;padding:10px;border-radius:8px;text-align:center;width:48%;}
.alerta h4{margin:0;color:#f1c40f;font-size:14px;}
.alerta p{margin:5px 0 0;font-size:16px;font-weight:bold;}
</style>
</head>
<body>
<header>Painel de Controle • NewEnergy</header>
<div class="container">

<div class="card">
  <h3>Status do Dispositivo</h3>
  <p id="status" class="status-offline">Offline</p>
</div>

<div class="card">
  <h3>Resumo Diário</h3>
  <canvas id="graficoResumo"></canvas>
  <div class="alertas">
    <div class="alerta">
      <h4>Temperatura fora do limite</h4>
      <p id="exTemp">0</p>
    </div>
    <div class="alerta">
      <h4>Umidade fora do limite</h4>
      <p id="exUmid">0</p>
    </div>
  </div>
</div>

<!-- BOTÃO VISÍVEL PARA HISTÓRICO -->
<div class="card">
  <h3>Histórico Completo</h3>
  <button onclick="window.location.href='historico.html'">Ver Histórico Completo</button>
</div>

<div class="card">
  <h3>Controle do LED</h3>
  <button id="btnLED">Ligar / Desligar LED</button>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyAEgLyJ6i2ZaSNnBrLMoe2ajInd4MGKHIs",
  authDomain:"controle-led-esp-oficial.firebaseapp.com",
  databaseURL:"https://controle-led-esp-oficial-default-rtdb.firebaseio.com",
  projectId:"controle-led-esp-oficial",
  storageBucket:"controle-led-esp-oficial.firebasestorage.app",
  messagingSenderId:"1082980860084",
  appId:"1:1082980860084:web:b3b669b8f1801c3d6657e1"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const statusEl = document.getElementById("status");
const btnLED = document.getElementById("btnLED");
const exTempEl = document.getElementById("exTemp");
const exUmidEl = document.getElementById("exUmid");
const ctxResumo = document.getElementById("graficoResumo");

let graficoResumo = new Chart(ctxResumo,{
    type:"bar",
    data:{labels:["Temperatura","Umidade"],datasets:[{label:"Média diária",data:[0,0],backgroundColor:["#ff3b3b","#3498db"]}]},
    options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
});

let ledState=false;
let espID="";

// Usuário logado
auth.onAuthStateChanged(user=>{
    if(user){
        const uid = user.uid;
        db.ref("/usuarios/"+uid+"/esp32ID").once("value").then(snapshot=>{
            espID = snapshot.val();
            if(!espID){alert("Nenhum ESP32 vinculado!"); return;}
            
            // Atualiza status e LED em tempo real
            db.ref("/esp32/"+espID).on("value", snapshot=>{
                const data = snapshot.val();
                if(data){
                    statusEl.innerText="Online"; statusEl.className="status-online";
                    ledState = data.led;
                    btnLED.innerText = ledState?"Desligar LED":"Ligar LED";
                } else {
                    statusEl.innerText="Offline"; statusEl.className="status-offline";
                }
            });

            // Calcula média diária e contagem de extrapolações
            function atualizarResumo(){
                db.ref("/historico/"+espID).once("value").then(snapshot=>{
                    const data = snapshot.val();
                    if(!data) return;

                    let tempSoma=0, umidSoma=0, count=0;
                    let exTemp=0, exUmid=0;
                    const agora = new Date();
                    for(const key in data){
                        const item = data[key];
                        const dt = new Date(item.timestamp);
                        if(dt.toDateString()===agora.toDateString()){
                            tempSoma += item.temperatura;
                            umidSoma += item.umidade;
                            count++;
                            if(item.temperatura>item.limiteMaxTemp || item.temperatura<item.limiteMinTemp) exTemp++;
                            if(item.umidade>item.limiteMaxUmid || item.umidade<item.limiteMinUmid) exUmid++;
                        }
                    }
                    const mediaTemp = count>0?tempSoma/count:0;
                    const mediaUmid = count>0?umidSoma/count:0;

                    graficoResumo.data.datasets[0].data=[mediaTemp,mediaUmid];
                    graficoResumo.update();

                    exTempEl.innerText=exTemp;
                    exUmidEl.innerText=exUmid;
                });
            }

            atualizarResumo();
            setInterval(atualizarResumo,30000);
        });
    } else {
        alert("Usuário não logado!");
        window.location.href="index.html";
    }
});

// Controle LED
btnLED.addEventListener("click", ()=>{
    if(!espID) return;
    ledState = !ledState;
    db.ref("/esp32/"+espID+"/led").set(ledState);
    btnLED.innerText = ledState?"Desligar LED":"Ligar LED";
});
</script>
</body>
</html>
